name: PR

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Latency guard
        run: npm run ci:latency

      - name: Scanner policy drift guard
        run: npm run ci:scanner-drift

      - name: Deterministic required-path guard
        run: npm run ci:deterministic

      - name: CDK synth
        run: npm run infra:synth
