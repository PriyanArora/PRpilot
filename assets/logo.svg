<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" width="760" height="220" role="img" aria-label="PRPilot">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="758" height="218" rx="18" fill="#0d1117" stroke="#1f2733" stroke-width="2"/>

  <!-- terminal dots -->
  <circle cx="34" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="56" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="30" r="6" fill="#27c93f"/>

  <!-- wordmark -->
  <text x="380" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"
        font-size="96" font-weight="800" letter-spacing="4"
        fill="url(#g)" filter="url(#glow)">PRPILOT</text>

  <!-- tagline -->
  <text x="380" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace"
        font-size="19" font-weight="500" letter-spacing="6"
        fill="#8b98a9">REVIEWS YOUR PR BEFORE A HUMAN HAS TO</text>

  <!-- cursor -->
  <rect x="516" y="150" width="16" height="4" rx="2" fill="#38bdf8"/>
</svg>
